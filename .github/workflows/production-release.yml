name: production release

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public production URL for post-deploy e2e
        required: true
        default: https://letovocorp.ru
      wait_timeout_seconds:
        description: Max time to wait for production to serve the release
        required: false
        default: "600"
      require_extended:
        description: Run mutating authenticated e2e checks after deployment
        required: false
        default: "false"
      child_avatar_migration_mode:
        description: Preview child avatar changes or apply an approved preview
        required: true
        type: choice
        options:
          - preview
          - apply
        default: preview
      child_avatar_expected_count:
        description: Required for apply; affected-row count from the approved preview
        required: false
        default: ""
      child_avatar_expected_sha256:
        description: Required for apply; SHA-256 of the approved preview CSV
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  BACKEND_BUILD_FILES: >-
    basic/auth.cc basic/analytics.cc basic/otel.cc basic/security.cc basic/utils.cc basic/pqxx_cp.cc basic/hash.cc
    basic/assist_funcs.cc basic/url_parser.cc basic/user_data.cc basic/checks.cc
    basic/media.cc basic/media_cash.cc basic/qr_worker.cc basic/ws_topic_authorizer.cc
    basic/ws_event_bus.cc basic/ws_endpoint.cc market/transactions.cc market/actives.cc
    market/DOM.cc letovo-soc-net/social.cc letovo-soc-net/achivements.cc
    letovo-soc-net/page_server.cc letovo-soc-net/authors.cc letovo-soc-net/chat.cc
    letovo-soc-net/chat_ws.cc
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-server
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-all-frontend
  REGISTRATION_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-registration-server
  UPLOADER_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-flask-uploader
  PLAYWRIGHT_VERSION: "1.55.1"
  LIVE_E2E_BASE_URL: https://letovocorp.ru
  LIVE_E2E_WAIT_TIMEOUT_SECONDS: ${{ inputs.wait_timeout_seconds }}
  LIVE_E2E_REQUIRE_AUTH: "true"
  LIVE_E2E_REQUIRE_EXTENDED: ${{ inputs.require_extended }}
  LIVE_E2E_REQUIRE_OTEL: "true"

jobs:
  preview-child-avatar-migration:
    if: inputs.child_avatar_migration_mode == 'preview'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout migration
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Configure production SSH
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_SSH_KEY: ${{ secrets.LETOVO_PROD_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$LETOVO_PROD_DEPLOY_SSH_KEY" > ~/.ssh/letovo-production-release
          chmod 600 ~/.ssh/letovo-production-release
          ssh-keyscan -H "$LETOVO_PROD_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Preserve child avatar migration preview
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_USER: ${{ secrets.LETOVO_PROD_DEPLOY_USER }}
          LETOVO_PROD_DEPLOY_COMPOSE: ${{ vars.LETOVO_PROD_DEPLOY_COMPOSE || '/srv/letovo/compose/docker-compose.yaml' }}
        run: |
          set -euo pipefail
          remote="${LETOVO_PROD_DEPLOY_USER}@${LETOVO_PROD_DEPLOY_HOST}"
          state_dir="/tmp/letovo-child-avatar-preview-${{ github.run_id }}"
          ssh -i ~/.ssh/letovo-production-release "$remote" "mkdir -p '$state_dir'"
          scp -i ~/.ssh/letovo-production-release docs/child_avatar_access_migration.sql \
            "$remote:$state_dir/child_avatar_access_migration.sql"
          ssh -i ~/.ssh/letovo-production-release "$remote" \
            "COMPOSE_FILE='$LETOVO_PROD_DEPLOY_COMPOSE' RUN_ID='${{ github.run_id }}' bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          state_dir="/tmp/letovo-child-avatar-preview-${RUN_ID}"
          migration="$state_dir/child_avatar_access_migration.sql"
          preview_tmp="$state_dir/child-avatar-migration-preview.csv"
          metadata_tmp="$state_dir/child-avatar-migration-preview.txt"
          backup_root="$(dirname "$(dirname "$COMPOSE_FILE")")/backups/child-avatar-preview-${RUN_ID}"

          as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          test -f "$migration"
          docker cp "$migration" letovo-postgres-1:/tmp/child_avatar_access_migration.sql
          docker exec letovo-postgres-1 \
            psql -q --csv -v ON_ERROR_STOP=1 -v apply=false \
              -U scv -d letovo_db \
              -f /tmp/child_avatar_access_migration.sql > "$preview_tmp"
          docker exec letovo-postgres-1 rm -f /tmp/child_avatar_access_migration.sql
          preview_count="$(tail -n +2 "$preview_tmp" | wc -l | tr -d ' ')"
          preview_sha256="$(sha256sum "$preview_tmp" | cut -d ' ' -f 1)"
          printf 'count=%s\nsha256=%s\n' "$preview_count" "$preview_sha256" > "$metadata_tmp"
          as_root mkdir -p "$backup_root"
          as_root install -m 0600 "$preview_tmp" "$backup_root/child-avatar-migration-preview.csv"
          as_root install -m 0600 "$metadata_tmp" "$backup_root/child-avatar-migration-preview.txt"
          echo "Child avatar preview preserved: count=$preview_count sha256=$preview_sha256 path=$backup_root"
          REMOTE

  release:
    if: inputs.child_avatar_migration_mode == 'apply'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout main with submodules
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Resolve release images
        id: release
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
        run: |
          set -euo pipefail
          release_sha="$(git rev-parse HEAD)"
          base_url="${INPUT_BASE_URL%/}"
          base_url="${base_url%/}"
          if [[ "$base_url" == *$'\r'* || "$base_url" == *$'\n'* ]]; then
            echo "base_url must not contain CR/LF"
            exit 1
          fi
          if [ "$base_url" != "https://letovocorp.ru" ]; then
            echo "base_url must be https://letovocorp.ru for production releases"
            exit 1
          fi
          {
            echo "RELEASE_SHA=$release_sha"
            echo "RELEASE_IMAGE_TAG=$release_sha"
            echo "LIVE_E2E_BASE_URL=$base_url"
            echo "BACKEND_RELEASE_IMAGE=${BACKEND_IMAGE}:${release_sha}"
            echo "REGISTRATION_RELEASE_IMAGE=${REGISTRATION_IMAGE}:${release_sha}"
            echo "FRONTEND_RELEASE_IMAGE=${FRONTEND_IMAGE}:${release_sha}"
            echo "UPLOADER_RELEASE_IMAGE=${UPLOADER_IMAGE}:${release_sha}"
            echo "LIVE_E2E_EXPECTED_BACKEND_SHA=$release_sha"
            echo "LIVE_E2E_EXPECTED_FRONTEND_SHA=$release_sha"
          } >> "$GITHUB_ENV"
          {
            echo "release_sha=$release_sha"
            echo "image_tag=$release_sha"
            echo "base_url=$base_url"
            echo "backend_image=${BACKEND_IMAGE}:${release_sha}"
            echo "registration_image=${REGISTRATION_IMAGE}:${release_sha}"
            echo "frontend_image=${FRONTEND_IMAGE}:${release_sha}"
            echo "uploader_image=${UPLOADER_IMAGE}:${release_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate production deployment secrets
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_USER: ${{ secrets.LETOVO_PROD_DEPLOY_USER }}
          LETOVO_PROD_DEPLOY_SSH_KEY: ${{ secrets.LETOVO_PROD_DEPLOY_SSH_KEY }}
          LETOVO_PROD_DEPLOY_COMPOSE: ${{ vars.LETOVO_PROD_DEPLOY_COMPOSE || '/srv/letovo/compose/docker-compose.yaml' }}
          LETOVO_PROD_DEPLOY_PROJECT: ${{ vars.LETOVO_PROD_DEPLOY_PROJECT || 'compose' }}
          LETOVO_PROD_NGINX_SITE: ${{ vars.LETOVO_PROD_NGINX_SITE || '/etc/nginx/sites-available/default' }}
          CHILD_AVATAR_EXPECTED_COUNT: ${{ inputs.child_avatar_expected_count }}
          CHILD_AVATAR_EXPECTED_SHA256: ${{ inputs.child_avatar_expected_sha256 }}
        run: |
          set -euo pipefail
          test -n "$LETOVO_PROD_DEPLOY_USER" || { echo "LETOVO_PROD_DEPLOY_USER secret is required"; exit 1; }
          test -n "$LETOVO_PROD_DEPLOY_SSH_KEY" || { echo "LETOVO_PROD_DEPLOY_SSH_KEY secret is required"; exit 1; }
          test -n "$LETOVO_PROD_DEPLOY_HOST" || { echo "LETOVO_PROD_DEPLOY_HOST is required"; exit 1; }
          test -n "$LETOVO_PROD_DEPLOY_COMPOSE" || { echo "LETOVO_PROD_DEPLOY_COMPOSE is required"; exit 1; }
          test -n "$LETOVO_PROD_DEPLOY_PROJECT" || { echo "LETOVO_PROD_DEPLOY_PROJECT is required"; exit 1; }
          test -n "$LETOVO_PROD_NGINX_SITE" || { echo "LETOVO_PROD_NGINX_SITE is required"; exit 1; }
          test "$LIVE_E2E_REQUIRE_AUTH" = "true"
          [[ "$CHILD_AVATAR_EXPECTED_COUNT" =~ ^[0-9]+$ ]] || { echo "child_avatar_expected_count must be a non-negative integer"; exit 1; }
          [[ "$CHILD_AVATAR_EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "child_avatar_expected_sha256 must be a lowercase SHA-256"; exit 1; }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js for frontend route scan
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Scan production frontend bundle routes
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_BASE_URL: ${{ steps.release.outputs.base_url }}/letovo-api
          NEXT_PUBLIC_BASE_URL_UPLOAD: ${{ steps.release.outputs.base_url }}/letovo-api/upload/
          NEXT_PUBLIC_BASE_URL_MEDIA: ${{ steps.release.outputs.base_url }}/letovo-api/media/get
          NEXT_PUBLIC_UPLOAD_URL: ${{ steps.release.outputs.base_url }}/letovo-api/upload/
          NEXT_PUBLIC_BASE_URL_CLEAR: ${{ steps.release.outputs.base_url }}
          LETOVO_BUILD_SHA: ${{ steps.release.outputs.release_sha }}
          NEXT_PUBLIC_OTEL_ENABLED: "true"
          NEXT_PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: /otel/v1/traces
          NEXT_PUBLIC_OTEL_SERVICE_NAME: letovo-frontend
          NEXT_PUBLIC_OTEL_DEPLOYMENT_ENVIRONMENT: production
          NEXT_PUBLIC_OTEL_SERVICE_NAMESPACE: letovocorp
          NEXT_PUBLIC_OTEL_TRACES_SAMPLER_RATIO: "0.1"
          NEXT_PUBLIC_LETOVO_BUILD_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail
          npm ci
          npm run build
          if grep -R -I -n -E 'ya\.sergeiscv\.ru|/undefined/auth|/letovo-api/letovo-api' .next; then
            echo "Found forbidden frontend route or host in built production bundle"
            exit 1
          fi

      - name: Build and push production backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ steps.release.outputs.release_sha }}
          tags: ${{ steps.release.outputs.backend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push production registration image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=registration_server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ steps.release.outputs.release_sha }}
          tags: ${{ steps.release.outputs.registration_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push production frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          build-args: |
            LETOVO_BUILD_SHA=${{ steps.release.outputs.release_sha }}
            NEXT_PUBLIC_BASE_URL=${{ steps.release.outputs.base_url }}/letovo-api
            NEXT_PUBLIC_BASE_URL_UPLOAD=${{ steps.release.outputs.base_url }}/letovo-api/upload/
            NEXT_PUBLIC_BASE_URL_MEDIA=${{ steps.release.outputs.base_url }}/letovo-api/media/get
            NEXT_PUBLIC_UPLOAD_URL=${{ steps.release.outputs.base_url }}/letovo-api/upload/
            NEXT_PUBLIC_BASE_URL_CLEAR=${{ steps.release.outputs.base_url }}
            NEXT_PUBLIC_OTEL_ENABLED=true
            NEXT_PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=/otel/v1/traces
            NEXT_PUBLIC_OTEL_SERVICE_NAME=letovo-frontend
            NEXT_PUBLIC_OTEL_DEPLOYMENT_ENVIRONMENT=production
            NEXT_PUBLIC_OTEL_SERVICE_NAMESPACE=letovocorp
            NEXT_PUBLIC_OTEL_TRACES_SAMPLER_RATIO=0.1
            NEXT_PUBLIC_LETOVO_BUILD_SHA=${{ steps.release.outputs.release_sha }}
          tags: ${{ steps.release.outputs.frontend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push production uploader image
        uses: docker/build-push-action@v5
        with:
          context: ./src/python-helpers
          file: ./src/python-helpers/dockerfile.uploader
          build-args: |
            UPLOADER_CAPABILITIES_URL=${{ steps.release.outputs.base_url }}/letovo-api/auth/amiuploader
          push: true
          tags: ${{ steps.release.outputs.uploader_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure production SSH
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_SSH_KEY: ${{ secrets.LETOVO_PROD_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$LETOVO_PROD_DEPLOY_SSH_KEY" > ~/.ssh/letovo-production-release
          chmod 600 ~/.ssh/letovo-production-release
          ssh-keyscan -H "$LETOVO_PROD_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Transfer production images to host
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_USER: ${{ secrets.LETOVO_PROD_DEPLOY_USER }}
        run: |
          set -euo pipefail
          remote="${LETOVO_PROD_DEPLOY_USER}@${LETOVO_PROD_DEPLOY_HOST}"
          images=(
            "$BACKEND_RELEASE_IMAGE"
            "$REGISTRATION_RELEASE_IMAGE"
            "$FRONTEND_RELEASE_IMAGE"
            "$UPLOADER_RELEASE_IMAGE"
          )
          for image in "${images[@]}"; do
            docker pull "$image"
          done
          docker save "${images[@]}" | gzip -1 | ssh -i ~/.ssh/letovo-production-release "$remote" 'gzip -dc | docker load'

      - name: Deploy production images
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_USER: ${{ secrets.LETOVO_PROD_DEPLOY_USER }}
          LETOVO_PROD_DEPLOY_COMPOSE: ${{ vars.LETOVO_PROD_DEPLOY_COMPOSE || '/srv/letovo/compose/docker-compose.yaml' }}
          LETOVO_PROD_DEPLOY_PROJECT: ${{ vars.LETOVO_PROD_DEPLOY_PROJECT || 'compose' }}
          LETOVO_PROD_NGINX_SITE: ${{ vars.LETOVO_PROD_NGINX_SITE || '/etc/nginx/sites-available/default' }}
          CHILD_AVATAR_EXPECTED_COUNT: ${{ inputs.child_avatar_expected_count }}
          CHILD_AVATAR_EXPECTED_SHA256: ${{ inputs.child_avatar_expected_sha256 }}
        run: |
          set -euo pipefail
          remote="${LETOVO_PROD_DEPLOY_USER}@${LETOVO_PROD_DEPLOY_HOST}"
          state_dir="/tmp/letovo-production-release-${{ github.run_id }}"
          ssh -i ~/.ssh/letovo-production-release "$remote" "mkdir -p '$state_dir'"
          scp -i ~/.ssh/letovo-production-release docs/docker-compose.yaml "$remote:$state_dir/docker-compose.yaml.from-repo"
          scp -i ~/.ssh/letovo-production-release docs/otel-collector-config.yaml "$remote:$state_dir/otel-collector-config.yaml.from-repo"
          scp -i ~/.ssh/letovo-production-release frontend/front-env.env "$remote:$state_dir/letovo-front.env.from-repo"
          scp -i ~/.ssh/letovo-production-release scripts/patch_nginx_otel.py "$remote:$state_dir/patch_nginx_otel.py"
          scp -i ~/.ssh/letovo-production-release docs/avatar_upload_role_migration.sql \
            "$remote:$state_dir/avatar_upload_role_migration.sql"
          scp -i ~/.ssh/letovo-production-release docs/child_avatar_access_migration.sql \
            "$remote:$state_dir/child_avatar_access_migration.sql"
          scp -i ~/.ssh/letovo-production-release docs/department_payout_migration.sql \
            "$remote:$state_dir/department_payout_migration.sql"
          ssh -i ~/.ssh/letovo-production-release "$remote" \
            "BACKEND_IMAGE='$BACKEND_RELEASE_IMAGE' REGISTRATION_IMAGE='$REGISTRATION_RELEASE_IMAGE' FRONTEND_IMAGE='$FRONTEND_RELEASE_IMAGE' UPLOADER_IMAGE='$UPLOADER_RELEASE_IMAGE' RELEASE_SHA='${{ steps.release.outputs.release_sha }}' COMPOSE_FILE='$LETOVO_PROD_DEPLOY_COMPOSE' PROJECT_NAME='$LETOVO_PROD_DEPLOY_PROJECT' NGINX_SITE='$LETOVO_PROD_NGINX_SITE' RUN_ID='${{ github.run_id }}' EXPECTED_CHILD_AVATAR_COUNT='$CHILD_AVATAR_EXPECTED_COUNT' EXPECTED_CHILD_AVATAR_SHA256='$CHILD_AVATAR_EXPECTED_SHA256' bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          test -f "$COMPOSE_FILE"
          test -f "$NGINX_SITE"
          state_dir="/tmp/letovo-production-release-${RUN_ID}"
          mkdir -p "$state_dir"
          restore="$state_dir/restore.env"
          compose_backup="$state_dir/docker-compose.yaml.before-release"
          otel_backup="$state_dir/otel-collector-config.yaml.before-release"
          front_env_backup="$state_dir/letovo-front.env.before-release"
          nginx_backup="$state_dir/nginx-site.before-release"
          candidate="$state_dir/docker-compose.yaml"
          repo_compose="$state_dir/docker-compose.yaml.from-repo"
          repo_otel="$state_dir/otel-collector-config.yaml.from-repo"
          repo_front_env="$state_dir/letovo-front.env.from-repo"
          migration="$state_dir/avatar_upload_role_migration.sql"
          child_avatar_migration="$state_dir/child_avatar_access_migration.sql"
          payout_migration="$state_dir/department_payout_migration.sql"
          nginx_candidate="$state_dir/nginx-site.candidate"
          compose_dir="$(dirname "$COMPOSE_FILE")"
          otel_config="$compose_dir/otel-collector-config.yaml"
          front_env="/mnt/letovo-front.env"
          smoke_name="letovo-server-release-smoke-${RUN_ID}"
          backup_root="$(dirname "$(dirname "$COMPOSE_FILE")")/backups/production-release-${RUN_ID}"
          role_backup="$backup_root/role.before-avatar-migration.sql"
          role_backup_tmp="$state_dir/role.before-avatar-migration.sql"
          user_backup="$backup_root/user.before-child-avatar-migration.sql"
          user_backup_tmp="$state_dir/user.before-child-avatar-migration.sql"
          transactions_backup="$backup_root/transactions.before-department-payout-migration.sql"
          transactions_backup_tmp="$state_dir/transactions.before-department-payout-migration.sql"
          child_avatar_preview="$backup_root/child-avatar-migration-preview.csv"
          child_avatar_preview_tmp="$state_dir/child-avatar-migration-preview.csv"

          as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          docker image inspect "$BACKEND_IMAGE" >/dev/null
          docker image inspect "$REGISTRATION_IMAGE" >/dev/null
          docker image inspect "$FRONTEND_IMAGE" >/dev/null
          docker image inspect "$UPLOADER_IMAGE" >/dev/null
          test -f "$repo_compose"
          test -f "$repo_otel"
          test -f "$repo_front_env"
          test -f "$migration"
          test -f "$child_avatar_migration"
          test -f "$payout_migration"
          as_root mkdir -p "$backup_root"
          docker exec letovo-postgres-1 \
            pg_dump -U scv -d letovo_db -t public.transactions > "$transactions_backup_tmp"
          test -s "$transactions_backup_tmp"
          as_root install -m 0600 "$transactions_backup_tmp" "$transactions_backup"
          docker cp "$payout_migration" letovo-postgres-1:/tmp/department_payout_migration.sql
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -U scv -d letovo_db \
              -f /tmp/department_payout_migration.sql
          docker exec letovo-postgres-1 rm -f /tmp/department_payout_migration.sql
          docker rm -f "$smoke_name" >/dev/null 2>&1 || true
          cleanup_smoke() {
            docker rm -f "$smoke_name" >/dev/null 2>&1 || true
          }
          trap cleanup_smoke EXIT

          cp "$COMPOSE_FILE" "$compose_backup"
          if [ -f "$otel_config" ]; then
            cp "$otel_config" "$otel_backup"
          fi
          if [ -f "$front_env" ]; then
            as_root cp "$front_env" "$front_env_backup"
          fi
          as_root cp "$NGINX_SITE" "$nginx_backup"
          docker inspect -f 'letovo-server={{.Config.Image}}' letovo-server > "$restore"
          docker inspect -f 'letovo-registration-server={{.Config.Image}}' letovo-registration-server >> "$restore"
          docker inspect -f 'letovo-front={{.Config.Image}}' letovo-front >> "$restore"
          docker inspect -f 'flask-uploader={{.Config.Image}}' flask-uploader >> "$restore"

          docker exec letovo-postgres-1 \
            pg_dump -U scv -d letovo_db -t public.role > "$role_backup_tmp"
          test -s "$role_backup_tmp"
          docker exec letovo-postgres-1 \
            pg_dump -U scv -d letovo_db -t 'public."user"' > "$user_backup_tmp"
          test -s "$user_backup_tmp"
          as_root mkdir -p "$backup_root"
          as_root install -m 0600 "$role_backup_tmp" "$role_backup"
          as_root install -m 0600 "$user_backup_tmp" "$user_backup"
          docker cp "$child_avatar_migration" \
            letovo-postgres-1:/tmp/child_avatar_access_migration.sql
          docker exec letovo-postgres-1 \
            psql -q --csv -v ON_ERROR_STOP=1 -v apply=false \
              -U scv -d letovo_db \
              -f /tmp/child_avatar_access_migration.sql > "$child_avatar_preview_tmp"
          child_avatar_preview_count="$(tail -n +2 "$child_avatar_preview_tmp" | wc -l | tr -d ' ')"
          child_avatar_preview_sha256="$(sha256sum "$child_avatar_preview_tmp" | cut -d ' ' -f 1)"
          test "$child_avatar_preview_count" = "$EXPECTED_CHILD_AVATAR_COUNT" || {
            echo "Child avatar preview count changed: expected $EXPECTED_CHILD_AVATAR_COUNT, got $child_avatar_preview_count"
            exit 1
          }
          test "$child_avatar_preview_sha256" = "$EXPECTED_CHILD_AVATAR_SHA256" || {
            echo "Child avatar preview hash changed: expected $EXPECTED_CHILD_AVATAR_SHA256, got $child_avatar_preview_sha256"
            exit 1
          }
          as_root install -m 0600 "$child_avatar_preview_tmp" \
            "$child_avatar_preview"
          # Forward-only additive migration: automatic table restoration could
          # erase permission edits made while release verification is running.
          docker cp "$migration" letovo-postgres-1:/tmp/avatar_upload_role_migration.sql
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -U scv -d letovo_db \
              -f /tmp/avatar_upload_role_migration.sql
          docker exec letovo-postgres-1 rm -f /tmp/avatar_upload_role_migration.sql
          docker cp "$child_avatar_preview_tmp" \
            letovo-postgres-1:/tmp/child_avatar_approved_preview.csv
          docker exec letovo-postgres-1 \
            chmod 0644 /tmp/child_avatar_approved_preview.csv
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -v apply=true -U scv -d letovo_db \
              -f /tmp/child_avatar_access_migration.sql
          docker exec letovo-postgres-1 \
            rm -f /tmp/child_avatar_access_migration.sql \
              /tmp/child_avatar_approved_preview.csv

          sed \
            -e "s#image: ghcr.io/letovo-dev/letovo-server:.*#image: ${BACKEND_IMAGE}#" \
            -e "s#image: .*flask-uploader.*#image: ${UPLOADER_IMAGE}#" \
            -e "s#image: ghcr.io/letovo-dev/letovo-registration-server:.*#image: ${REGISTRATION_IMAGE}#" \
            -e "s#image: .*letovo.*front.*:.*#image: ${FRONTEND_IMAGE}#" \
            -e "s#LETOVO_BUILD_SHA: \".*\"#LETOVO_BUILD_SHA: \"${RELEASE_SHA}\"#" \
            "$repo_compose" > "$candidate"

          docker run -d \
            --name "$smoke_name" \
            --network host \
            -e SERVER_ADRESS=127.0.0.1 \
            -e SERVER_PORT=18080 \
            -e LETOVO_BUILD_SHA="$RELEASE_SHA" \
            -e OTEL_SERVICE_NAME=letovo-server-release-smoke \
            -e OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318 \
            -e OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://127.0.0.1:4318/v1/traces \
            -e OTEL_TRACES_EXPORTER=otlp \
            -e OTEL_LOG_LEVEL=info \
            -v /mnt/server-media:/app/pages \
            -v /mnt/server-configs:/app/configs \
            "$BACKEND_IMAGE"

          smoke_status=""
          for _ in $(seq 1 20); do
            if [ "$(docker inspect -f '{{.State.Running}}' "$smoke_name" 2>/dev/null || true)" != "true" ]; then
              break
            fi
            smoke_status="$(curl --connect-timeout 2 --max-time 5 -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:18080/auth/login || true)"
            if [ "$smoke_status" = "501" ]; then
              break
            fi
            sleep 2
          done
          if [ "$smoke_status" != "501" ]; then
            echo "Candidate letovo-server image failed pre-deploy smoke on 127.0.0.1:18080; got ${smoke_status:-no response}"
            docker ps -a --filter "name=$smoke_name" || true
            docker logs --tail 200 "$smoke_name" || true
            exit 1
          fi
          cleanup_smoke
          trap - EXIT

          cp "$repo_otel" "$otel_config"
          as_root install -m 0644 "$repo_front_env" "$front_env"
          cp "$candidate" "$COMPOSE_FILE"

          python3 "$state_dir/patch_nginx_otel.py" "$NGINX_SITE" "$nginx_candidate" --server-name letovocorp.ru
          as_root cp "$nginx_candidate" "$NGINX_SITE"
          if ! as_root nginx -t; then
            as_root cp "$nginx_backup" "$NGINX_SITE"
            as_root nginx -t
            exit 1
          fi
          as_root nginx -s reload || as_root systemctl reload nginx

          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" up -d jaeger otel-collector letovo-server letovo-registration-server letovo-front letovo-flask-uploader
          test "$(docker inspect -f '{{.State.Running}}' jaeger)" = "true"
          test "$(docker inspect -f '{{.State.Running}}' otel-collector)" = "true"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-server)" = "$BACKEND_IMAGE"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-registration-server)" = "$REGISTRATION_IMAGE"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-front)" = "$FRONTEND_IMAGE"
          test "$(docker inspect -f '{{.Config.Image}}' flask-uploader)" = "$UPLOADER_IMAGE"

          backend_status=""
          for _ in $(seq 1 30); do
            backend_status="$(curl --connect-timeout 2 --max-time 5 -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/auth/login || true)"
            if [ "$backend_status" = "501" ]; then
              break
            fi
            sleep 2
          done
          if [ "$backend_status" != "501" ]; then
            echo "Expected letovo-server on 127.0.0.1:8080 to return 501 for GET /auth/login, got ${backend_status:-no response}"
            docker ps -a --filter "name=letovo-server" --filter "name=otel-collector" --filter "name=jaeger" || true
            docker logs --tail 200 letovo-server || true
            docker logs --tail 200 otel-collector || true
            docker logs --tail 200 jaeger || true
            exit 1
          fi
          REMOTE

      - name: Set up Node.js for live e2e
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright runtime
        run: |
          set -euo pipefail
          export PLAYWRIGHT_PACKAGE_DIR="$RUNNER_TEMP/letovo-live-e2e"
          mkdir -p "$PLAYWRIGHT_PACKAGE_DIR"
          cd "$PLAYWRIGHT_PACKAGE_DIR"
          npm init -y
          npm install "playwright@${PLAYWRIGHT_VERSION}"
          "$PLAYWRIGHT_PACKAGE_DIR/node_modules/.bin/playwright" install --with-deps chromium
          echo "PLAYWRIGHT_PACKAGE_DIR=$PLAYWRIGHT_PACKAGE_DIR" >> "$GITHUB_ENV"

      - name: Run production live e2e
        env:
          LETOVO_E2E_USERNAME: ${{ secrets.LETOVO_E2E_USERNAME }}
          LETOVO_E2E_PASSWORD: ${{ secrets.LETOVO_E2E_PASSWORD }}
          LETOVO_E2E_SECONDARY_USERNAME: ${{ secrets.LETOVO_E2E_SECONDARY_USERNAME }}
          LETOVO_E2E_SECONDARY_PASSWORD: ${{ secrets.LETOVO_E2E_SECONDARY_PASSWORD }}
        run: node $GITHUB_WORKSPACE/test/e2e/live-platform-smoke.mjs

      - name: Verify production OTEL storage
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_USER: ${{ secrets.LETOVO_PROD_DEPLOY_USER }}
        run: |
          set -euo pipefail
          remote="${LETOVO_PROD_DEPLOY_USER}@${LETOVO_PROD_DEPLOY_HOST}"
          ssh -i ~/.ssh/letovo-production-release "$remote" 'bash -s' <<'REMOTE'
          set -euo pipefail
          trace_id="11111111111111111111111111111111"
          for _ in $(seq 1 30); do
            body="$(curl -fsS "http://127.0.0.1:16686/api/traces/${trace_id}" || true)"
            if printf '%s' "$body" | grep -q 'live-e2e-otel-smoke'; then
              exit 0
            fi
            sleep 2
          done
          echo "Jaeger did not return the live e2e OTEL smoke span"
          docker logs --tail 200 otel-collector || true
          docker logs --tail 200 jaeger || true
          exit 1
          REMOTE

      - name: Roll back production images on failure
        if: failure()
        env:
          LETOVO_PROD_DEPLOY_HOST: ${{ vars.LETOVO_PROD_DEPLOY_HOST || '84.201.185.37' }}
          LETOVO_PROD_DEPLOY_USER: ${{ secrets.LETOVO_PROD_DEPLOY_USER }}
          LETOVO_PROD_DEPLOY_COMPOSE: ${{ vars.LETOVO_PROD_DEPLOY_COMPOSE || '/srv/letovo/compose/docker-compose.yaml' }}
          LETOVO_PROD_DEPLOY_PROJECT: ${{ vars.LETOVO_PROD_DEPLOY_PROJECT || 'compose' }}
          LETOVO_PROD_NGINX_SITE: ${{ vars.LETOVO_PROD_NGINX_SITE || '/etc/nginx/sites-available/default' }}
        run: |
          set -euo pipefail
          test -f ~/.ssh/letovo-production-release || exit 0
          remote="${LETOVO_PROD_DEPLOY_USER}@${LETOVO_PROD_DEPLOY_HOST}"
          ssh -i ~/.ssh/letovo-production-release "$remote" \
            "COMPOSE_FILE='$LETOVO_PROD_DEPLOY_COMPOSE' PROJECT_NAME='$LETOVO_PROD_DEPLOY_PROJECT' NGINX_SITE='$LETOVO_PROD_NGINX_SITE' RUN_ID='${{ github.run_id }}' bash -s" <<'REMOTE'
          set -euo pipefail
          state_dir="/tmp/letovo-production-release-${RUN_ID}"
          restore="$state_dir/restore.env"
          compose_backup="$state_dir/docker-compose.yaml.before-release"
          otel_backup="$state_dir/otel-collector-config.yaml.before-release"
          front_env_backup="$state_dir/letovo-front.env.before-release"
          nginx_backup="$state_dir/nginx-site.before-release"
          test -f "$restore" || exit 0
          test -f "$compose_backup" || exit 0

          as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          cp "$compose_backup" "$COMPOSE_FILE"
          if [ -f "$otel_backup" ]; then
            cp "$otel_backup" "$(dirname "$COMPOSE_FILE")/otel-collector-config.yaml"
          fi
          if [ -f "$front_env_backup" ]; then
            as_root install -m 0644 "$front_env_backup" /mnt/letovo-front.env
          fi
          if [ -f "$nginx_backup" ]; then
            as_root cp "$nginx_backup" "$NGINX_SITE"
            as_root nginx -t
            as_root nginx -s reload || as_root systemctl reload nginx
          fi
          backend_image="$(awk -F= '$1 == "letovo-server" { print $2 }' "$restore" | tail -n 1)"
          registration_image="$(awk -F= '$1 == "letovo-registration-server" { print $2 }' "$restore" | tail -n 1)"
          frontend_image="$(awk -F= '$1 == "letovo-front" { print $2 }' "$restore" | tail -n 1)"
          uploader_image="$(awk -F= '$1 == "flask-uploader" { print $2 }' "$restore" | tail -n 1)"
          test -n "$backend_image"
          test -n "$registration_image"
          test -n "$frontend_image"
          test -n "$uploader_image"
          docker image inspect "$backend_image" >/dev/null
          docker image inspect "$registration_image" >/dev/null
          docker image inspect "$frontend_image" >/dev/null
          docker image inspect "$uploader_image" >/dev/null

          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" up -d letovo-server letovo-registration-server letovo-front letovo-flask-uploader
          test "$(docker inspect -f '{{.Config.Image}}' letovo-server)" = "$backend_image"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-registration-server)" = "$registration_image"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-front)" = "$frontend_image"
          test "$(docker inspect -f '{{.Config.Image}}' flask-uploader)" = "$uploader_image"
          # Keep the backward-compatible schema migration. The durable role
          # dump is reserved for deliberate operator recovery, not blind rollback.
          rm -rf "$state_dir"
          REMOTE
