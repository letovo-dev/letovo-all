name: build and verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  BACKEND_BUILD_FILES: >-
    basic/auth.cc basic/analytics.cc basic/otel.cc basic/security.cc basic/utils.cc basic/pqxx_cp.cc basic/hash.cc
    basic/assist_funcs.cc basic/url_parser.cc basic/user_data.cc basic/checks.cc
    basic/media.cc basic/media_cash.cc basic/qr_worker.cc basic/ws_topic_authorizer.cc
    basic/ws_event_bus.cc basic/ws_endpoint.cc market/transactions.cc market/actives.cc
    market/DOM.cc letovo-soc-net/social.cc letovo-soc-net/achivements.cc
    letovo-soc-net/page_server.cc letovo-soc-net/authors.cc letovo-soc-net/chat.cc
    letovo-soc-net/chat_ws.cc
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-server
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-all-frontend
  REGISTRATION_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-registration-server
  UPLOADER_IMAGE: ghcr.io/${{ github.repository_owner }}/letovo-flask-uploader
  LIVE_E2E_BASE_URL: ${{ vars.LIVE_E2E_BASE_URL || 'https://ya.sergeiscv.ru' }}

jobs:
  backend-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image locally
        uses: docker/build-push-action@v5
        with:
          context: ./src
          load: true
          push: false
          build-args: |
            MAIN_FILE=server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ github.sha }}
          tags: letovo-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect backend image
        run: docker image inspect letovo-server:${{ github.sha }} >/dev/null

      - name: Run avatar policy regression with sanitizers
        run: |
          g++ -std=c++20 -fsanitize=address,undefined -fno-omit-frame-pointer \
            test/avatar_policy_regression.cc -o "$RUNNER_TEMP/avatar-policy-regression"
          "$RUNNER_TEMP/avatar-policy-regression"

      - name: Build registration backend image locally
        uses: docker/build-push-action@v5
        with:
          context: ./src
          load: true
          push: false
          build-args: |
            MAIN_FILE=registration_server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ github.sha }}
          tags: letovo-registration-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect registration backend image
        run: docker image inspect letovo-registration-server:${{ github.sha }} >/dev/null

      - name: Build uploader image locally
        uses: docker/build-push-action@v5
        with:
          context: ./src/python-helpers
          file: ./src/python-helpers/dockerfile.uploader
          load: true
          push: false
          tags: letovo-flask-uploader:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect uploader image
        run: docker image inspect letovo-flask-uploader:${{ github.sha }} >/dev/null

  publish-pr-candidate:
    if: github.event_name == 'pull_request'
    needs: [backend-pr, frontend-verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Refuse forked pull requests
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Live deployment e2e publishes immutable PR images, so forked PRs are not supported."
          exit 1

      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ github.sha }}
          tags: ${{ env.BACKEND_IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push PR registration backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=registration_server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ github.sha }}
          tags: ${{ env.REGISTRATION_IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push PR frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          build-args: |
            LETOVO_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_BASE_URL=${{ env.LIVE_E2E_BASE_URL }}/letovo-api
            NEXT_PUBLIC_BASE_URL_UPLOAD=${{ env.LIVE_E2E_BASE_URL }}/letovo-api/upload/
            NEXT_PUBLIC_BASE_URL_MEDIA=${{ env.LIVE_E2E_BASE_URL }}/letovo-api/media/get
            NEXT_PUBLIC_UPLOAD_URL=${{ env.LIVE_E2E_BASE_URL }}/letovo-api/upload/
            NEXT_PUBLIC_BASE_URL_CLEAR=${{ env.LIVE_E2E_BASE_URL }}
            NEXT_PUBLIC_OTEL_ENABLED=true
            NEXT_PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=/otel/v1/traces
            NEXT_PUBLIC_OTEL_SERVICE_NAME=letovo-frontend
            NEXT_PUBLIC_OTEL_DEPLOYMENT_ENVIRONMENT=production
            NEXT_PUBLIC_OTEL_SERVICE_NAMESPACE=letovocorp
            NEXT_PUBLIC_OTEL_TRACES_SAMPLER_RATIO=0.1
            NEXT_PUBLIC_LETOVO_BUILD_SHA=${{ github.sha }}
          tags: ${{ env.FRONTEND_IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push PR uploader image
        uses: docker/build-push-action@v5
        with:
          context: ./src/python-helpers
          file: ./src/python-helpers/dockerfile.uploader
          push: true
          build-args: |
            UPLOADER_CAPABILITIES_URL=${{ env.LIVE_E2E_BASE_URL }}/letovo-api/auth/amiuploader
          tags: ${{ env.UPLOADER_IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/letovo-server:latest
            ghcr.io/${{ github.repository_owner }}/letovo-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push registration backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=registration_server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
            LETOVO_BUILD_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/letovo-registration-server:latest
            ghcr.io/${{ github.repository_owner }}/letovo-registration-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          build-args: |
            LETOVO_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_BASE_URL=${{ vars.PRODUCTION_BASE_URL || 'https://letovocorp.ru' }}/letovo-api
            NEXT_PUBLIC_BASE_URL_UPLOAD=${{ vars.PRODUCTION_BASE_URL || 'https://letovocorp.ru' }}/letovo-api/upload/
            NEXT_PUBLIC_BASE_URL_MEDIA=${{ vars.PRODUCTION_BASE_URL || 'https://letovocorp.ru' }}/letovo-api/media/get
            NEXT_PUBLIC_UPLOAD_URL=${{ vars.PRODUCTION_BASE_URL || 'https://letovocorp.ru' }}/letovo-api/upload/
            NEXT_PUBLIC_BASE_URL_CLEAR=${{ vars.PRODUCTION_BASE_URL || 'https://letovocorp.ru' }}
            NEXT_PUBLIC_OTEL_ENABLED=true
            NEXT_PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=/otel/v1/traces
            NEXT_PUBLIC_OTEL_SERVICE_NAME=letovo-frontend
            NEXT_PUBLIC_OTEL_DEPLOYMENT_ENVIRONMENT=production
            NEXT_PUBLIC_OTEL_SERVICE_NAMESPACE=letovocorp
            NEXT_PUBLIC_OTEL_TRACES_SAMPLER_RATIO=0.1
            NEXT_PUBLIC_LETOVO_BUILD_SHA=${{ github.sha }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push uploader image
        uses: docker/build-push-action@v5
        with:
          context: ./src/python-helpers
          file: ./src/python-helpers/dockerfile.uploader
          push: true
          build-args: |
            UPLOADER_CAPABILITIES_URL=${{ vars.PRODUCTION_BASE_URL || 'https://letovocorp.ru' }}/letovo-api/auth/amiuploader
          tags: |
            ${{ env.UPLOADER_IMAGE }}:latest
            ${{ env.UPLOADER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend OpenTelemetry wiring
        working-directory: frontend
        run: npm run test:opentelemetry

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_OTEL_ENABLED: "true"
          NEXT_PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: /otel/v1/traces
          NEXT_PUBLIC_OTEL_SERVICE_NAME: letovo-frontend
          NEXT_PUBLIC_OTEL_DEPLOYMENT_ENVIRONMENT: production
          NEXT_PUBLIC_OTEL_SERVICE_NAMESPACE: letovocorp
          NEXT_PUBLIC_OTEL_TRACES_SAMPLER_RATIO: "0.1"
          NEXT_PUBLIC_LETOVO_BUILD_SHA: ${{ github.sha }}
        run: npm run build

      - name: Scan frontend bundle for known bad routes
        working-directory: frontend
        run: |
          if grep -R -I -n -E 'ya\.sergeiscv\.ru|/undefined/auth|/letovo-api/letovo-api' .next; then
            echo "Found forbidden frontend route or host in built bundle"
            exit 1
          fi

  live-deployment-e2e:
    if: github.event_name == 'pull_request'
    needs: [publish-pr-candidate]
    runs-on: ubuntu-latest
    concurrency:
      group: live-deployment-e2e
      cancel-in-progress: false
    env:
      PLAYWRIGHT_VERSION: "1.55.1"
      LIVE_E2E_WAIT_TIMEOUT_SECONDS: ${{ vars.LIVE_E2E_WAIT_TIMEOUT_SECONDS || '600' }}
      LIVE_E2E_REQUIRE_AUTH: "true"
      LIVE_E2E_REQUIRE_ACCOUNT_SWITCH: "true"
      LIVE_E2E_REQUIRE_EXTENDED: ${{ vars.LIVE_E2E_REQUIRE_EXTENDED || 'false' }}
      LIVE_E2E_REQUIRE_OTEL: "false"
      LIVE_E2E_EXPECTED_BACKEND_SHA: ${{ github.sha }}
      LIVE_E2E_EXPECTED_FRONTEND_SHA: ${{ github.sha }}
      LETOVO_E2E_DEPLOY_HOST: ${{ vars.LETOVO_E2E_DEPLOY_HOST || 'ya.sergeiscv.ru' }}
      LETOVO_E2E_DEPLOY_USER: ${{ secrets.LETOVO_E2E_DEPLOY_USER }}
      LETOVO_E2E_DEPLOY_SSH_KEY: ${{ secrets.LETOVO_E2E_DEPLOY_SSH_KEY }}
      LETOVO_E2E_DEPLOY_COMPOSE: ${{ vars.LETOVO_E2E_DEPLOY_COMPOSE || '/mnt/docker-compose.yaml' }}
      LETOVO_E2E_DEPLOY_PROJECT: ${{ vars.LETOVO_E2E_DEPLOY_PROJECT || 'mnt' }}
    steps:
      - name: Set PR candidate image names
        run: |
          set -euo pipefail
          tag="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          {
            echo "BACKEND_CANDIDATE_IMAGE=${BACKEND_IMAGE}:${tag}"
            echo "REGISTRATION_CANDIDATE_IMAGE=${REGISTRATION_IMAGE}:${tag}"
            echo "FRONTEND_CANDIDATE_IMAGE=${FRONTEND_IMAGE}:${tag}"
            echo "UPLOADER_CANDIDATE_IMAGE=${UPLOADER_IMAGE}:${tag}"
          } >> "$GITHUB_ENV"

      - name: Validate live e2e deployment secrets
        run: |
          set -euo pipefail
          test -n "$LETOVO_E2E_DEPLOY_USER" || { echo "LETOVO_E2E_DEPLOY_USER secret is required"; exit 1; }
          test -n "$LETOVO_E2E_DEPLOY_SSH_KEY" || { echo "LETOVO_E2E_DEPLOY_SSH_KEY secret is required"; exit 1; }
          test -n "$BACKEND_CANDIDATE_IMAGE" || { echo "backend candidate image is required"; exit 1; }
          test -n "$REGISTRATION_CANDIDATE_IMAGE" || { echo "registration candidate image is required"; exit 1; }
          test -n "$FRONTEND_CANDIDATE_IMAGE" || { echo "frontend candidate image is required"; exit 1; }
          test -n "$UPLOADER_CANDIDATE_IMAGE" || { echo "uploader candidate image is required"; exit 1; }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure deployment SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$LETOVO_E2E_DEPLOY_SSH_KEY" > ~/.ssh/live-e2e
          chmod 600 ~/.ssh/live-e2e
          ssh-keyscan -H "$LETOVO_E2E_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy PR candidate images to live e2e
        run: |
          set -euo pipefail
          remote="${LETOVO_E2E_DEPLOY_USER}@${LETOVO_E2E_DEPLOY_HOST}"
          state_dir="/tmp/letovo-live-e2e-${{ github.run_id }}"
          ssh -i ~/.ssh/live-e2e "$remote" "mkdir -p '$state_dir'"
          scp -i ~/.ssh/live-e2e docs/avatar_upload_role_migration.sql \
            "$remote:$state_dir/avatar_upload_role_migration.sql"
          scp -i ~/.ssh/live-e2e docs/child_avatar_access_migration.sql \
            "$remote:$state_dir/child_avatar_access_migration.sql"
          scp -i ~/.ssh/live-e2e docs/department_payout_migration.sql \
            "$remote:$state_dir/department_payout_migration.sql"
          scp -i ~/.ssh/live-e2e docs/publisher_authorization_migration.sql \
            "$remote:$state_dir/publisher_authorization_migration.sql"
          ssh -i ~/.ssh/live-e2e "$remote" \
            "BACKEND_IMAGE='$BACKEND_CANDIDATE_IMAGE' REGISTRATION_IMAGE='$REGISTRATION_CANDIDATE_IMAGE' FRONTEND_IMAGE='$FRONTEND_CANDIDATE_IMAGE' UPLOADER_IMAGE='$UPLOADER_CANDIDATE_IMAGE' COMPOSE_FILE='$LETOVO_E2E_DEPLOY_COMPOSE' PROJECT_NAME='$LETOVO_E2E_DEPLOY_PROJECT' RUN_ID='${{ github.run_id }}' bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          test -f "$COMPOSE_FILE"
          state_dir="/tmp/letovo-live-e2e-${RUN_ID}"
          mkdir -p "$state_dir"
          restore="$state_dir/restore.env"
          candidate="$state_dir/docker-compose.yaml"
          migration="$state_dir/avatar_upload_role_migration.sql"
          child_avatar_migration="$state_dir/child_avatar_access_migration.sql"
          payout_migration="$state_dir/department_payout_migration.sql"
          publisher_authorization_migration="$state_dir/publisher_authorization_migration.sql"
          backup_root="$HOME/backups/letovo-live-e2e-${RUN_ID}"
          role_backup="$backup_root/role.before-avatar-migration.sql"
          user_backup="$backup_root/user.before-child-avatar-migration.sql"
          transactions_backup="$backup_root/transactions.before-department-payout-migration.sql"
          child_avatar_preview="$backup_root/child-avatar-migration-preview.csv"

          test -f "$migration"
          test -f "$child_avatar_migration"
          test -f "$payout_migration"
          test -f "$publisher_authorization_migration"
          mkdir -p "$backup_root"
          docker exec letovo-postgres-1 \
            pg_dump -U scv -d letovo_db -t public.transactions > "$transactions_backup"
          test -s "$transactions_backup"
          docker cp "$payout_migration" letovo-postgres-1:/tmp/department_payout_migration.sql
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -U scv -d letovo_db \
              -f /tmp/department_payout_migration.sql
          docker exec letovo-postgres-1 rm -f /tmp/department_payout_migration.sql
          docker cp "$publisher_authorization_migration" \
            letovo-postgres-1:/tmp/publisher_authorization_migration.sql
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -U scv -d letovo_db \
              -f /tmp/publisher_authorization_migration.sql
          docker exec letovo-postgres-1 rm -f /tmp/publisher_authorization_migration.sql

          docker inspect -f 'letovo-server={{.Config.Image}}' letovo-server > "$restore"
          docker inspect -f 'letovo-registration-server={{.Config.Image}}' letovo-registration-server >> "$restore"
          docker inspect -f 'letovo-front={{.Config.Image}}' letovo-front >> "$restore"
          docker inspect -f 'flask-uploader={{.Config.Image}}' flask-uploader >> "$restore"

          docker exec letovo-postgres-1 \
            pg_dump -U scv -d letovo_db -t public.role > "$role_backup"
          test -s "$role_backup"
          docker exec letovo-postgres-1 \
            pg_dump -U scv -d letovo_db -t 'public."user"' > "$user_backup"
          test -s "$user_backup"
          docker cp "$child_avatar_migration" \
            letovo-postgres-1:/tmp/child_avatar_access_migration.sql
          docker exec letovo-postgres-1 \
            psql -q --csv -v ON_ERROR_STOP=1 -v apply=false \
              -U scv -d letovo_db \
              -f /tmp/child_avatar_access_migration.sql > "$child_avatar_preview"
          # Forward-only additive migration: never restore the whole role table
          # automatically, because that could erase concurrent permission edits.
          docker cp "$migration" letovo-postgres-1:/tmp/avatar_upload_role_migration.sql
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -U scv -d letovo_db \
              -f /tmp/avatar_upload_role_migration.sql
          docker exec letovo-postgres-1 rm -f /tmp/avatar_upload_role_migration.sql
          docker cp "$child_avatar_preview" \
            letovo-postgres-1:/tmp/child_avatar_approved_preview.csv
          docker exec letovo-postgres-1 \
            chmod 0644 /tmp/child_avatar_approved_preview.csv
          docker exec letovo-postgres-1 \
            psql -v ON_ERROR_STOP=1 -v apply=true -U scv -d letovo_db \
              -f /tmp/child_avatar_access_migration.sql
          docker exec letovo-postgres-1 \
            rm -f /tmp/child_avatar_access_migration.sql \
              /tmp/child_avatar_approved_preview.csv

          sed -E \
            -e "s#image: ghcr.io/letovo-dev/letovo-server:.*#image: ${BACKEND_IMAGE}#" \
            -e "s#image: ghcr.io/letovo-dev/letovo-registration-server:.*#image: ${REGISTRATION_IMAGE}#" \
            -e "/^    letovo-front:/,/^    [[:alnum:]_-]+:$/ s#^([[:space:]]*)image:.*#\\1image: ${FRONTEND_IMAGE}#" \
            -e "/^    letovo-flask-uploader:/,/^    [[:alnum:]_-]+:$/ s#^([[:space:]]*)image:.*#\\1image: ${UPLOADER_IMAGE}#" \
            "$COMPOSE_FILE" > "$candidate"

          docker compose -p "$PROJECT_NAME" -f "$candidate" pull letovo-server letovo-registration-server letovo-front letovo-flask-uploader
          docker compose -p "$PROJECT_NAME" -f "$candidate" up -d letovo-server letovo-registration-server letovo-front letovo-flask-uploader
          test "$(docker inspect -f '{{.Config.Image}}' letovo-server)" = "$BACKEND_IMAGE"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-registration-server)" = "$REGISTRATION_IMAGE"
          test "$(docker inspect -f '{{.Config.Image}}' letovo-front)" = "$FRONTEND_IMAGE"
          test "$(docker inspect -f '{{.Config.Image}}' flask-uploader)" = "$UPLOADER_IMAGE"
          REMOTE

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright runtime
        run: |
          set -euo pipefail
          export PLAYWRIGHT_PACKAGE_DIR="$RUNNER_TEMP/letovo-live-e2e"
          mkdir -p "$PLAYWRIGHT_PACKAGE_DIR"
          cd "$PLAYWRIGHT_PACKAGE_DIR"
          npm init -y
          npm install "playwright@${PLAYWRIGHT_VERSION}"
          "$PLAYWRIGHT_PACKAGE_DIR/node_modules/.bin/playwright" install --with-deps chromium
          echo "PLAYWRIGHT_PACKAGE_DIR=$PLAYWRIGHT_PACKAGE_DIR" >> "$GITHUB_ENV"

      - name: Run live browser smoke
        env:
          LETOVO_E2E_USERNAME: ${{ secrets.LETOVO_E2E_USERNAME }}
          LETOVO_E2E_PASSWORD: ${{ secrets.LETOVO_E2E_PASSWORD }}
          LETOVO_E2E_SECONDARY_USERNAME: ${{ secrets.LETOVO_E2E_SECONDARY_USERNAME }}
          LETOVO_E2E_SECONDARY_PASSWORD: ${{ secrets.LETOVO_E2E_SECONDARY_PASSWORD }}
        run: node $GITHUB_WORKSPACE/test/e2e/live-platform-smoke.mjs

      - name: Restore live deployment images
        if: always()
        run: |
          set -euo pipefail
          test -f ~/.ssh/live-e2e || exit 0
          remote="${LETOVO_E2E_DEPLOY_USER}@${LETOVO_E2E_DEPLOY_HOST}"
          ssh -i ~/.ssh/live-e2e "$remote" \
            "COMPOSE_FILE='$LETOVO_E2E_DEPLOY_COMPOSE' PROJECT_NAME='$LETOVO_E2E_DEPLOY_PROJECT' RUN_ID='${{ github.run_id }}' bash -s" <<'REMOTE'
          set -euo pipefail
          state_dir="/tmp/letovo-live-e2e-${RUN_ID}"
          restore="$state_dir/restore.env"
          test -f "$restore" || exit 0

          backend_image="$(awk -F= '$1 == "letovo-server" { print $2 }' "$restore" | tail -n 1)"
          registration_image="$(awk -F= '$1 == "letovo-registration-server" { print $2 }' "$restore" | tail -n 1)"
          frontend_image="$(awk -F= '$1 == "letovo-front" { print $2 }' "$restore" | tail -n 1)"
          uploader_image="$(awk -F= '$1 == "flask-uploader" { print $2 }' "$restore" | tail -n 1)"
          test -n "$backend_image"
          test -n "$registration_image"
          test -n "$frontend_image"
          test -n "$uploader_image"

          candidate="$state_dir/docker-compose.restore.yaml"
          sed -E \
            -e "s#image: ghcr.io/letovo-dev/letovo-server:.*#image: ${backend_image}#" \
            -e "s#image: ghcr.io/letovo-dev/letovo-registration-server:.*#image: ${registration_image}#" \
            -e "/^    letovo-front:/,/^    [[:alnum:]_-]+:$/ s#^([[:space:]]*)image:.*#\\1image: ${frontend_image}#" \
            -e "/^    letovo-flask-uploader:/,/^    [[:alnum:]_-]+:$/ s#^([[:space:]]*)image:.*#\\1image: ${uploader_image}#" \
            "$COMPOSE_FILE" > "$candidate"

          docker compose -p "$PROJECT_NAME" -f "$candidate" pull letovo-server letovo-registration-server letovo-front letovo-flask-uploader || true
          docker compose -p "$PROJECT_NAME" -f "$candidate" up -d letovo-server letovo-registration-server letovo-front letovo-flask-uploader
          test "$(docker inspect -f '{{.Config.Image}}' flask-uploader)" = "$uploader_image"
          # The additive schema migration intentionally remains in place. The
          # retained role dump is for explicit operator recovery only.
          rm -rf "$state_dir"
          REMOTE
