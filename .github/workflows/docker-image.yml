name: build and verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  BACKEND_BUILD_FILES: >-
    basic/auth.cc basic/security.cc basic/utils.cc basic/pqxx_cp.cc basic/hash.cc
    basic/assist_funcs.cc basic/url_parser.cc basic/user_data.cc basic/checks.cc
    basic/media.cc basic/media_cash.cc basic/qr_worker.cc basic/ws_topic_authorizer.cc
    basic/ws_event_bus.cc basic/ws_endpoint.cc market/transactions.cc market/actives.cc
    market/DOM.cc letovo-soc-net/social.cc letovo-soc-net/achivements.cc
    letovo-soc-net/page_server.cc letovo-soc-net/authors.cc letovo-soc-net/chat.cc
    letovo-soc-net/chat_ws.cc

jobs:
  backend-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image locally
        uses: docker/build-push-action@v5
        with:
          context: ./src
          load: true
          push: false
          build-args: |
            MAIN_FILE=server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
          tags: letovo-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect backend image
        run: docker image inspect letovo-server:${{ github.sha }} >/dev/null

      - name: Build registration backend image locally
        uses: docker/build-push-action@v5
        with:
          context: ./src
          load: true
          push: false
          build-args: |
            MAIN_FILE=registration_server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
          tags: letovo-registration-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect registration backend image
        run: docker image inspect letovo-registration-server:${{ github.sha }} >/dev/null

  publish-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/letovo-server:latest
            ghcr.io/${{ github.repository_owner }}/letovo-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push registration backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          build-args: |
            MAIN_FILE=registration_server.cpp
            TEST_FILE=test.cpp
            BUILD_FILES=${{ env.BACKEND_BUILD_FILES }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/letovo-registration-server:latest
            ghcr.io/${{ github.repository_owner }}/letovo-registration-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Scan frontend bundle for known bad routes
        working-directory: frontend
        run: |
          if grep -R -I -n -E 'ya\.sergeiscv\.ru|/undefined/auth|/letovo-api/letovo-api' .next; then
            echo "Found forbidden frontend route or host in built bundle"
            exit 1
          fi
