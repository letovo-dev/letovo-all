version: '3.8'

services:
    otel-collector:
        image: otel/opentelemetry-collector:0.155.0
        container_name: otel-collector
        restart: unless-stopped
        command: ["--config=/etc/otelcol/config.yaml"]
        volumes:
          - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
        ports:
          - "127.0.0.1:4317:4317"
          - "127.0.0.1:4318:4318"
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "5"

    letovo-server:
        image: ghcr.io/letovo-dev/letovo-server:latest
        container_name: letovo-server
        restart: unless-stopped
        network_mode: "host"
        depends_on:
          - otel-collector
        environment:
          OTEL_SERVICE_NAME: letovo-server
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4318
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://127.0.0.1:4318/v1/traces
          OTEL_TRACES_EXPORTER: otlp
          OTEL_LOG_LEVEL: info
        volumes:
          - /mnt/server-media:/app/pages
          - /mnt/server-configs:/app/configs
        labels:
          - "com.centurylinklabs.watchtower.enable=true"
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "5"

    letovo-registration-server:
        image: ghcr.io/letovo-dev/letovo-registration-server:latest
        container_name: letovo-registration-server
        restart: unless-stopped
        network_mode: "host"
        depends_on:
          - otel-collector
        environment:
          SERVER_ADRESS: "127.0.0.1"
          SERVER_PORT: "8082"
          OTEL_SERVICE_NAME: letovo-registration-server
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4318
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://127.0.0.1:4318/v1/traces
          OTEL_TRACES_EXPORTER: otlp
          OTEL_LOG_LEVEL: info
        volumes:
          - /mnt/server-media:/app/pages
          - /mnt/server-configs:/app/configs
        labels:
          - "com.centurylinklabs.watchtower.enable=false"
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "5"

    watchtower:
        image: containrrr/watchtower
        restart: unless-stopped
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /home/sergei-scv/.docker/config.json:/config.json:ro
        command: --interval 300 --cleanup --include-restarting --label-enable
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "5"

    letovo-front:
        image: ghcr.io/letovo-dev/letovo-all-frontend:latest
        container_name: letovo-front
        restart: unless-stopped
        depends_on:
          - letovo-server
        ports:
          - "127.0.0.1:3000:3000"
        env_file:
          - /mnt/letovo-front.env
        environment:
          NEXT_PUBLIC_OTEL_ENABLED: "true"
          NEXT_PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: /otel/v1/traces
        init: true
        cap_drop:
          - ALL
        security_opt:
          - no-new-privileges:true
        labels:
          - "com.centurylinklabs.watchtower.enable=true"
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "10"

    letovo-flask-uploader:
        image: flask-uploader:latest
        container_name: flask-uploader
        restart: unless-stopped
        volumes:
          - /mnt/server-media:/app/pages
        ports:
          - "8880:8880"
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "5"

    keycloak:
        image: quay.io/keycloak/keycloak:26.0
        command: ["start"]                    # без лишней экзотики
        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://172.17.0.1:5432/keycloak?sslmode=disable
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: keycloak

            KC_PROXY: edge
            KC_HTTP_RELATIVE_PATH: /auth-center
            KC_HOSTNAME_URL: https://letovocorp.ru/auth-center
            KC_HOSTNAME_ADMIN_URL: https://letovocorp.ru/auth-center
            KC_HOSTNAME_STRICT: "false"

            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
        ports:
          - "8081:8080"
        logging:
          driver: json-file
          options:
            max-size: "100m"
            max-file: "5"
